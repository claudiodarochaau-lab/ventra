<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ventra Chat — Test</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1rem;
    }

    #chat-container {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      height: 80vh;
      max-height: 700px;
    }

    #chat-header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid #e0e0e0;
      font-size: 0.85rem;
      color: #888;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    #chat-header strong {
      color: #111;
      font-size: 1rem;
      text-transform: none;
      letter-spacing: 0;
      display: block;
      margin-bottom: 2px;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .message {
      max-width: 80%;
      padding: 0.6rem 0.9rem;
      border-radius: 6px;
      font-size: 0.95rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user {
      align-self: flex-end;
      background: #111;
      color: #fff;
    }

    .message.assistant {
      align-self: flex-start;
      background: #f0f0f0;
      color: #111;
    }

    .message.error {
      align-self: center;
      background: #fff3f3;
      color: #c00;
      border: 1px solid #fcc;
      font-size: 0.85rem;
    }

    .message.thinking {
      align-self: flex-start;
      background: #f0f0f0;
      color: #999;
      font-style: italic;
      font-size: 0.9rem;
    }

    #input-row {
      display: flex;
      gap: 0.5rem;
      padding: 1rem;
      border-top: 1px solid #e0e0e0;
    }

    #user-input {
      flex: 1;
      padding: 0.6rem 0.85rem;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      resize: none;
      line-height: 1.4;
    }

    #user-input:focus {
      border-color: #888;
    }

    #send-btn {
      padding: 0.6rem 1.1rem;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 0.95rem;
      cursor: pointer;
      white-space: nowrap;
      align-self: flex-end;
    }

    #send-btn:hover { background: #333; }
    #send-btn:disabled { background: #aaa; cursor: not-allowed; }
  </style>
</head>
<body>

<div id="chat-container">
  <div id="chat-header">
    <strong>Ventra Coffee</strong>
    Chat test — POST /chat
  </div>

  <div id="messages">
    <div class="message assistant">Hi! I'm the Ventra Coffee assistant. How can I help you today?</div>
  </div>

  <div id="input-row">
    <textarea id="user-input" rows="1" placeholder="Type a message…"></textarea>
    <button id="send-btn">Send</button>
  </div>
</div>

<script>
  const messagesEl = document.getElementById("messages");
  const inputEl = document.getElementById("user-input");
  const sendBtn = document.getElementById("send-btn");

  // Conversation history sent to the API (excludes the initial greeting above)
  const history = [];

  function appendMessage(role, text) {
    const div = document.createElement("div");
    div.className = `message ${role}`;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  async function send() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = "";
    inputEl.style.height = "auto";
    sendBtn.disabled = true;

    appendMessage("user", text);
    history.push({ role: "user", content: text });

    const thinking = appendMessage("thinking", "…");

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: history }),
      });

      thinking.remove();

      if (!res.ok) {
        const err = await res.json().catch(() => ({ error: `HTTP ${res.status}` }));
        appendMessage("error", `Error: ${err.error ?? res.statusText}`);
      } else {
        const data = await res.json();
        const reply = data.response ?? "(empty response)";
        appendMessage("assistant", reply);
        history.push({ role: "assistant", content: reply });
      }
    } catch (err) {
      thinking.remove();
      appendMessage("error", `Network error: ${err.message}`);
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }

  sendBtn.addEventListener("click", send);

  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  // Auto-resize textarea
  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
  });
</script>

</body>
</html>
